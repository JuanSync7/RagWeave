# PostgreSQL tuning configuration
# Shared by temporal-db and rag-postgres containers.
# Mounted as /etc/postgresql/postgresql.conf (read-only).
#
# Tune shared_buffers and effective_cache_size to ~25% and ~75%
# of the memory you allocate to the container.

# ── Network ──────────────────────────────────────────────────────────────
# REQUIRED: accept connections from other Docker containers (not just localhost).
listen_addresses = '*'

# ── Connections ──────────────────────────────────────────────────────────
max_connections = 50                  # Temporal + LiteLLM need <20 each

# ── Memory ───────────────────────────────────────────────────────────────
shared_buffers = 128MB                # Raise to 256MB if container has ≥2GB RAM
work_mem = 8MB                        # Per-sort / per-hash; safe default
maintenance_work_mem = 64MB           # VACUUM, CREATE INDEX
effective_cache_size = 512MB          # Planner hint; no actual allocation

# ── WAL / durability ─────────────────────────────────────────────────────
wal_level = replica                   # Default; needed if you ever want replication
max_wal_size = 1GB                    # Cap WAL growth between checkpoints
min_wal_size = 80MB
checkpoint_completion_target = 0.9    # Spread checkpoint I/O
wal_compression = zstd                # Reduces WAL size on disk (Postgres 16+)

# ── Autovacuum ───────────────────────────────────────────────────────────
# More aggressive than defaults — Temporal tables see heavy INSERT/UPDATE/DELETE.
autovacuum = on
autovacuum_vacuum_scale_factor = 0.05   # VACUUM when 5% of rows are dead (default: 20%)
autovacuum_analyze_scale_factor = 0.02  # ANALYZE when 2% of rows change (default: 10%)
autovacuum_vacuum_cost_delay = 2ms      # Reduce autovacuum I/O throttle

# ── Logging ──────────────────────────────────────────────────────────────
log_min_duration_statement = 2000     # Log queries taking >2s
log_connections = off
log_disconnections = off
log_timezone = 'UTC'

# ── Timezone ─────────────────────────────────────────────────────────────
timezone = 'UTC'
