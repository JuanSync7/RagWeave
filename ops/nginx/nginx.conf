map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name aion.local localhost;
    return 301 https://$host$request_uri;
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name aion.local localhost;

    # Generated by scripts/generate-certs.sh — re-run if certs are missing
    ssl_certificate     /etc/nginx/certs/aion.local+1.pem;
    ssl_certificate_key /etc/nginx/certs/aion.local+1-key.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE support (buffering disabled below); WebSocket upgrade headers included for future use
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Generous timeouts for LLM generation
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Disable buffering for streaming responses
    proxy_buffering off;

    location / {
        proxy_pass http://rag-api:8000;
    }
}
