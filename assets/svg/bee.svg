<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -16 30 27">
  <!--
    Reusable, scalable bee SVG component.

    Origin (0,0) is the center of the body.
    viewBox sized to tightly contain all parts (antennae, wings, stinger).
    No fixed width/height — scales to any container size.

    SCALING:
      - As standalone: <img src="bee.svg" width="60">  (any size)
      - Inline embed:  <g transform="translate(x,y) scale(s) rotate(angle)"> ... </g>
      - All coordinates are relative, all strokes scale proportionally.

    Optional: add a flight trail path before the bee group:
      <path d="M38,2 C30,8 22,-4 14,2 C6,8 -2,-2 -8,3"
            fill="none" stroke="#fbbf24" stroke-width="0.6"
            opacity="0.3" stroke-dasharray="2 2"/>

    Color palette:
      Body:    #f59e0b
      Head:    #d97706
      Stripes: #1c1917
      Wings:   #fef3c7 fill, #fcd34d stroke
      Antenna: #d97706 stem, #fbbf24 tips
  -->

  <!-- Body (abdomen) -->
  <ellipse cx="0" cy="0" rx="4" ry="6.5" fill="#f59e0b" opacity="0.85"/>

  <!-- Stripes -->
  <line x1="-3.5" y1="-2" x2="3.5" y2="-2" stroke="#1c1917" stroke-width="1.2" opacity="0.6"/>
  <line x1="-3.8" y1="1" x2="3.8" y2="1" stroke="#1c1917" stroke-width="1.2" opacity="0.6"/>
  <line x1="-3.2" y1="4" x2="3.2" y2="4" stroke="#1c1917" stroke-width="1" opacity="0.5"/>

  <!-- Wings (spreading outward from mid-body, rendered on top) -->
  <ellipse cx="-5.5" cy="0" rx="7" ry="4" fill="#fef3c7" fill-opacity="0.22" stroke="#fcd34d" stroke-width="0.5" opacity="0.7" transform="rotate(-30 -5.5 0)"/>
  <ellipse cx="5.5" cy="0" rx="7" ry="4" fill="#fef3c7" fill-opacity="0.18" stroke="#fcd34d" stroke-width="0.5" opacity="0.6" transform="rotate(30 5.5 0)"/>

  <!-- Head -->
  <ellipse cx="0" cy="-7.5" rx="3" ry="2.5" fill="#d97706" opacity="0.8"/>

  <!-- Antennae -->
  <path d="M-1.5,-9.5 C-3,-13 -5,-14 -6,-13" fill="none" stroke="#d97706" stroke-width="0.6" opacity="0.7"/>
  <path d="M1.5,-9.5 C3,-13 5,-14 6,-13" fill="none" stroke="#d97706" stroke-width="0.6" opacity="0.7"/>
  <circle cx="-6" cy="-13" r="0.8" fill="#fbbf24" opacity="0.6"/>
  <circle cx="6" cy="-13" r="0.8" fill="#fbbf24" opacity="0.6"/>

  <!-- Stinger -->
  <path d="M0,6.5 L0,9" stroke="#d97706" stroke-width="0.5" opacity="0.5"/>
</svg>