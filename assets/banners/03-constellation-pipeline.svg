<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <filter id="docGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="answerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg3)"/>
  <rect width="1280" height="320" fill="url(#centerGlow)"/>

  <!-- Distant stars background -->
  <g fill="#e2e8f0" opacity="0.15">
    <circle cx="45" cy="28" r="0.5"/><circle cx="120" cy="290" r="0.4"/><circle cx="200" cy="15" r="0.6"/>
    <circle cx="340" cy="305" r="0.4"/><circle cx="450" cy="25" r="0.5"/><circle cx="580" cy="295" r="0.5"/>
    <circle cx="700" cy="18" r="0.4"/><circle cx="820" cy="308" r="0.6"/><circle cx="950" cy="22" r="0.4"/>
    <circle cx="1050" cy="298" r="0.5"/><circle cx="1180" cy="30" r="0.5"/><circle cx="1240" cy="285" r="0.4"/>
    <circle cx="90" cy="145" r="0.3"/><circle cx="1220" cy="150" r="0.3"/>
    <circle cx="30" cy="200" r="0.4"/><circle cx="1260" cy="100" r="0.4"/>
  </g>

  <!-- LEFT: Scattered documents (raw input) -->
  <g filter="url(#docGlow)" opacity="0.6">
    <!-- Doc 1 - text page -->
    <g transform="translate(60, 50) rotate(-12)">
      <rect width="40" height="52" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
      <line x1="8" y1="12" x2="32" y2="12" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="18" x2="30" y2="18" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="24" x2="28" y2="24" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="30" x2="24" y2="30" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="36" x2="32" y2="36" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="42" x2="20" y2="42" stroke="#64748b" stroke-width="0.8"/>
    </g>

    <!-- Doc 2 - PDF -->
    <g transform="translate(140, 180) rotate(8)">
      <rect width="36" height="46" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
      <rect x="6" y="6" width="24" height="8" rx="2" fill="#ef4444" opacity="0.3"/>
      <text x="18" y="13" text-anchor="middle" font-family="monospace" font-size="6" fill="#ef4444" opacity="0.6">PDF</text>
      <line x1="8" y1="20" x2="28" y2="20" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="26" x2="26" y2="26" stroke="#64748b" stroke-width="0.8"/>
      <line x1="8" y1="32" x2="28" y2="32" stroke="#64748b" stroke-width="0.8"/>
    </g>

    <!-- Doc 3 - image -->
    <g transform="translate(50, 220) rotate(-5)">
      <rect width="44" height="36" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
      <circle cx="14" cy="13" r="4" fill="#3b82f6" opacity="0.3"/>
      <path d="M6,30 L16,20 L24,26 L32,18 L38,24 L38,30 Z" fill="#22c55e" opacity="0.15"/>
    </g>

    <!-- Doc 4 - table -->
    <g transform="translate(170, 60) rotate(5)">
      <rect width="42" height="36" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
      <line x1="6" y1="12" x2="36" y2="12" stroke="#64748b" stroke-width="0.8"/>
      <line x1="6" y1="18" x2="36" y2="18" stroke="#64748b" stroke-width="0.5"/>
      <line x1="6" y1="24" x2="36" y2="24" stroke="#64748b" stroke-width="0.5"/>
      <line x1="18" y1="6" x2="18" y2="30" stroke="#64748b" stroke-width="0.5"/>
    </g>

    <!-- Doc 5 - code -->
    <g transform="translate(100, 130) rotate(-3)">
      <rect width="38" height="44" rx="4" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
      <text x="8" y="16" font-family="monospace" font-size="5" fill="#a78bfa" opacity="0.6">def</text>
      <text x="10" y="24" font-family="monospace" font-size="5" fill="#64748b" opacity="0.5">  ret</text>
      <text x="8" y="32" font-family="monospace" font-size="5" fill="#64748b" opacity="0.5">for</text>
    </g>
  </g>

  <!-- Dissolve transition lines from docs to center -->
  <g opacity="0.15" stroke="#a78bfa" stroke-width="0.5">
    <line x1="100" y1="80" x2="380" y2="120"/>
    <line x1="170" y1="90" x2="400" y2="130"/>
    <line x1="130" y1="155" x2="420" y2="145"/>
    <line x1="160" y1="210" x2="440" y2="170"/>
    <line x1="80" y1="240" x2="400" y2="180"/>
  </g>

  <!-- CENTER: Star field / embedding space -->
  <g filter="url(#starGlow)">
    <!-- Embedding dots - varying sizes and colors for multi-modal -->
    <!-- Text embeddings - blue tones -->
    <circle cx="380" cy="100" r="2.5" fill="#60a5fa" opacity="0.7"/>
    <circle cx="420" cy="80" r="1.8" fill="#93c5fd" opacity="0.5"/>
    <circle cx="450" cy="120" r="2" fill="#60a5fa" opacity="0.6"/>
    <circle cx="400" cy="140" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="480" cy="95" r="1.5" fill="#93c5fd" opacity="0.5"/>
    <circle cx="510" cy="130" r="2.2" fill="#60a5fa" opacity="0.65"/>
    <circle cx="440" cy="155" r="1.8" fill="#93c5fd" opacity="0.5"/>
    <circle cx="470" cy="170" r="2.5" fill="#3b82f6" opacity="0.7"/>

    <!-- Visual embeddings - purple/pink tones -->
    <circle cx="540" cy="100" r="2.8" fill="#a78bfa" opacity="0.75"/>
    <circle cx="570" cy="140" r="2" fill="#c084fc" opacity="0.6"/>
    <circle cx="520" cy="160" r="1.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="560" cy="180" r="2.3" fill="#a78bfa" opacity="0.65"/>
    <circle cx="590" cy="115" r="1.8" fill="#c084fc" opacity="0.55"/>
    <circle cx="610" cy="155" r="2.5" fill="#a78bfa" opacity="0.7"/>

    <!-- Cross-modal clusters -->
    <circle cx="500" cy="150" r="3.5" fill="#818cf8" opacity="0.85"/>
    <circle cx="550" cy="125" r="3" fill="#818cf8" opacity="0.8"/>

    <!-- Lower field -->
    <circle cx="420" cy="200" r="2" fill="#60a5fa" opacity="0.5"/>
    <circle cx="460" cy="220" r="1.5" fill="#93c5fd" opacity="0.4"/>
    <circle cx="500" cy="195" r="2.5" fill="#818cf8" opacity="0.65"/>
    <circle cx="540" cy="210" r="1.8" fill="#a78bfa" opacity="0.55"/>
    <circle cx="580" cy="195" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="520" cy="240" r="1.5" fill="#60a5fa" opacity="0.4"/>
    <circle cx="470" cy="250" r="2" fill="#818cf8" opacity="0.5"/>

    <!-- Upper sparse -->
    <circle cx="430" cy="55" r="1.2" fill="#93c5fd" opacity="0.35"/>
    <circle cx="490" cy="45" r="1" fill="#c084fc" opacity="0.3"/>
    <circle cx="550" cy="60" r="1.5" fill="#a78bfa" opacity="0.4"/>
    <circle cx="600" cy="75" r="1.2" fill="#60a5fa" opacity="0.35"/>

    <!-- Bottom sparse -->
    <circle cx="440" cy="270" r="1" fill="#93c5fd" opacity="0.3"/>
    <circle cx="530" cy="275" r="1.3" fill="#c084fc" opacity="0.35"/>
    <circle cx="580" cy="260" r="1" fill="#818cf8" opacity="0.3"/>
  </g>

  <!-- Transition lines from center to right -->
  <g opacity="0.15" stroke="#a78bfa" stroke-width="0.5">
    <line x1="610" y1="130" x2="880" y2="120"/>
    <line x1="600" y1="150" x2="860" y2="140"/>
    <line x1="590" y1="170" x2="870" y2="155"/>
    <line x1="580" y1="190" x2="850" y2="165"/>
    <line x1="620" y1="110" x2="890" y2="135"/>
  </g>

  <!-- RIGHT: Answer bubble -->
  <g filter="url(#answerGlow)" transform="translate(920, 85)">
    <!-- Main bubble -->
    <rect width="280" height="150" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" opacity="0.7"/>

    <!-- Bubble content lines (answer text) -->
    <g opacity="0.5">
      <rect x="24" y="24" width="180" height="6" rx="3" fill="#a5b4fc"/>
      <rect x="24" y="38" width="220" height="6" rx="3" fill="#a5b4fc"/>
      <rect x="24" y="52" width="160" height="6" rx="3" fill="#a5b4fc"/>
      <rect x="24" y="66" width="200" height="6" rx="3" fill="#a5b4fc"/>
      <rect x="24" y="80" width="140" height="6" rx="3" fill="#a5b4fc"/>
      <rect x="24" y="100" width="232" height="6" rx="3" fill="#c7d2fe" opacity="0.7"/>
      <rect x="24" y="114" width="190" height="6" rx="3" fill="#c7d2fe" opacity="0.7"/>
    </g>

    <!-- Source citations -->
    <g opacity="0.4">
      <rect x="170" y="100" width="8" height="8" rx="2" fill="#818cf8"/>
      <rect x="182" y="100" width="8" height="8" rx="2" fill="#818cf8"/>
      <rect x="194" y="100" width="8" height="8" rx="2" fill="#818cf8"/>
    </g>
  </g>

  <!-- Flow arrows -->
  <g opacity="0.25" fill="none" stroke="#a78bfa" stroke-width="1.5">
    <!-- Left arrow -->
    <path d="M260,160 L340,160"/>
    <path d="M330,155 L340,160 L330,165"/>
    <!-- Right arrow -->
    <path d="M660,160 L860,160"/>
    <path d="M850,155 L860,160 L850,165"/>
  </g>

  <!-- Phase labels -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle" letter-spacing="2" opacity="0.5">
    <text x="130" y="300">INGEST</text>
    <text x="510" y="300">EMBED</text>
    <text x="1060" y="290">RETRIEVE</text>
  </g>

  <!-- Title -->
  <g filter="url(#titleGlow3)">
    <text x="640" y="155" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#e0e7ff" letter-spacing="5">RagWeave</text>
  </g>

  <!-- Subtitle -->
  <text x="640" y="188" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#6366f1" letter-spacing="5" font-weight="300" opacity="0.7">MULTI-MODAL RAG PLATFORM</text>
</svg>