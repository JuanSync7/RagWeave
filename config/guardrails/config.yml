# NeMo Guardrails Configuration — AION RAG Pipeline
# See docs/retrieval/NEMO_GUARDRAILS_SPEC.md for full requirements.

models:
  - type: main
    engine: ollama
    model: ${RAG_OLLAMA_MODEL:-qwen2.5:3b}
    parameters:
      base_url: ${RAG_OLLAMA_URL:-http://localhost:11434}
      temperature: 0.1

rails:
  input:
    flows:
      - check intent
      - check jailbreak
      - jailbreak detection heuristics
  output:
    flows:
      - check faithfulness
      - self check facts
      - self check output

  config:
    # Jailbreak detection thresholds (perplexity-based)
    jailbreak_detection:
      length_per_perplexity_threshold: 89.79
      prefix_suffix_perplexity_threshold: 1845.65

    # Sensitive data detection (Presidio-backed)
    sensitive_data_detection:
      input:
        entities:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - US_SSN
          - CREDIT_CARD
          - PERSON
        score_threshold: 0.4
      output:
        entities:
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - US_SSN
          - CREDIT_CARD
          - PERSON
        score_threshold: 0.4
      recognizers: []
