# Sandbox policy for the RAG Temporal worker.
#
# The worker loads BAAI embedding/reranker models into GPU memory at startup,
# connects to Temporal for task scheduling, and processes user queries against
# the shared rag-weaviate container. It also calls Ollama for LLM inference and
# optionally reports traces to Langfuse.
#
# This policy restricts the worker to only the resources it needs.

apiVersion: openshell.nvidia.com/v1
kind: SandboxPolicy
metadata:
  name: rag-worker
  labels:
    component: temporal-worker
    stack: rag
spec:
  enforcement: audit_only  # Change to "deny" after initial validation period

  sandbox:
    # ── Filesystem ──────────────────────────────────────────────
    filesystem:
      allow:
        - path: /app
          access: read-only
          description: "Application source code and config"

        - path: /models
          access: read-only
          description: "BAAI BGE-M3 embedding and BGE-Reranker-v2-M3 models"

        - path: /tmp
          access: read-write
          description: "Python tempfiles"

        - path: /usr/local/lib/python*
          access: read-only
          description: "Python standard library and site-packages"

        - path: /usr/lib
          access: read-only
          description: "System shared libraries"

      deny_all_other: true

    # ── Network ─────────────────────────────────────────────────
    network:
      allow:
        - host: temporal
          port: 7233
          protocol: tcp
          description: "Temporal gRPC — task queue and workflow coordination"

        - host: rag-redis
          port: 6379
          protocol: tcp
          description: "Redis — query cache and conversation memory"

        - host: rag-weaviate
          port: 8080
          protocol: tcp
          description: "Weaviate REST — schema and CRUD"

        - host: rag-weaviate
          port: 50051
          protocol: tcp
          description: "Weaviate gRPC — hybrid search and batch operations"

        - host: host.docker.internal
          port: 11435
          protocol: tcp
          description: "Ollama LLM inference proxy on host"

        # Langfuse observability (optional — remove if observability profile not active)
        - host: host.docker.internal
          port: 3000
          protocol: tcp
          description: "Langfuse web UI for trace reporting"

      deny_all_other: true

    # ── Process ─────────────────────────────────────────────────
    process:
      allow:
        - binary: /usr/local/bin/python*
          description: "Python interpreter for worker process"
      max_processes: 15  # Main + ThreadPoolExecutor(4); Weaviate now runs out-of-process
      deny_exec: true    # Worker no longer needs to shell out; Weaviate is a separate service

  # ── Credentials ─────────────────────────────────────────────
  credentials:
    inject:
      - name: LANGFUSE_SECRET_KEY
        source: vault://rag/langfuse-secret
        description: "Langfuse observability secret key"

      - name: LANGFUSE_PUBLIC_KEY
        source: vault://rag/langfuse-public
        description: "Langfuse observability public key"

    filesystem_leakage: deny

  # ── Inference Routing ───────────────────────────────────────
  # Defer to privacy-router.yaml for inference routing rules.
  # This section enables the hook; routing rules are centralized.
  inference_routing:
    enabled: true
    policy_ref: privacy-router

  # ── Audit ───────────────────────────────────────────────────
  audit:
    level: standard
    events:
      - policy_violations
      - credential_access
      - network_connections
      - filesystem_access_denied
    export:
      prometheus:
        enabled: true
        port: 9102
      json_log:
        enabled: true
        path: /var/log/openshell/rag-worker.jsonl
        rotation:
          max_size_mb: 100
          max_files: 10
