worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # --- Connection buffering / timeouts ---
    keepalive_timeout     65;
    client_body_timeout   30s;
    client_header_timeout 15s;
    send_timeout          30s;
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    30s;
    client_max_body_size  50m;

    # --- IP-based rate limiting (coarse DDoS protection) ---
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=10r/s;
    limit_req_status 429;

    # --- Upstream ---
    # Port must match RAG_API_PORT in .env (default: 8000).
    # For dynamic substitution, use envsubst on this template at container start.
    upstream rag_api {
        server rag-api:${RAG_API_PORT};
        keepalive 32;
    }

    # --- HTTP -> HTTPS redirect ---
    server {
        listen 80;
        server_name _;

        # Health check accessible over HTTP for external monitors.
        location /health {
            proxy_pass http://rag_api;
            include /etc/nginx/proxy_params.conf;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS server ---
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Security headers ---
        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

        # --- Console static assets (served directly by nginx) ---
        location /console/static/ {
            alias /usr/share/nginx/console-static/;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # --- Rate-limited query endpoints ---
        location /query {
            limit_req zone=api_rate burst=20 nodelay;
            proxy_pass http://rag_api;
            include /etc/nginx/proxy_params.conf;
        }

        # --- Streaming endpoint (disable buffering, longer timeout) ---
        location /query/stream {
            limit_req zone=api_rate burst=20 nodelay;
            proxy_pass http://rag_api;
            include /etc/nginx/proxy_params.conf;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        # --- All other routes -> upstream ---
        location / {
            proxy_pass http://rag_api;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
